name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      track:
        description: "Release track"
        required: true
        default: "alpha"
        type: choice
        options:
          - alpha
          - beta
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: ${{ secrets.PACKAGE_NAME || 'org.deepbreathe.apno' }}

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-apk-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-apk-${{ runner.os }}-

      - name: Clean corrupted p4a cache
        run: |
          rm -rf .buildozer/android/platform/python-for-android
          rm -rf ~/.buildozer/android/platform/python-for-android

      - name: Build APK
        run: |
          docker run --rm \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            -v "${{ github.workspace }}:/app:Z" \
            -v "$HOME/.buildozer:/home/user/.buildozer:Z" \
            -w /app \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apno-android-apk
          path: bin/*.apk
          retention-days: 7

  build-aab:
    name: Build Android AAB
    runs-on: ubuntu-latest
    environment: play-console

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          fi

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-aab-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-aab-${{ runner.os }}-

      - name: Clean corrupted p4a cache
        run: |
          rm -rf .buildozer/android/platform/python-for-android
          rm -rf ~/.buildozer/android/platform/python-for-android

      - name: Build AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v "$HOME/.buildozer:/home/user/.buildozer" \
            -e P4A_RELEASE_KEYSTORE=/app/release.keystore \
            -e P4A_RELEASE_KEYALIAS=${{ secrets.ANDROID_KEYSTORE_ALIAS }} \
            -e P4A_RELEASE_KEYSTORE_PASSWD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -e P4A_RELEASE_KEYALIAS_PASSWD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            -w /app \
            kivy/buildozer:latest \
            android release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: apno-android-aab
          path: bin/*.aab
          retention-days: 7

  deploy-google-play:
    name: Deploy to Google Play
    needs: [build-aab]
    runs-on: ubuntu-latest
    environment: play-console

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: apno-android-aab
          path: bin

      - name: Get track
        id: track
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TRACK="${{ github.event.inputs.track }}"
          else
            TRACK="alpha"
          fi
          echo "track=$TRACK" >> $GITHUB_OUTPUT

      - name: Deploy to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_CREDENTIALS }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: bin/*.aab
          track: ${{ steps.track.outputs.track }}
          status: completed
